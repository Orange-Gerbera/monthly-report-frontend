<nav class="navbar navbar-expand-lg navbar-light app-navbar fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand ms-1">報告書管理システム</a>

    <!-- セレクト（管理者 & 複数） -->
    <div class="d-flex align-items-center ms-3" *ngIf="isAdmin && managerDepartments.length > 1">
      <select
        class="form-select form-select-sm"
        style="min-width: 220px; width: auto;"
        [(ngModel)]="selectedDepartmentId"
        (ngModelChange)="onDepartmentChange()"
      >
        <option
          *ngFor="let dept of managerDepartments"
          [value]="dept.id"
        >
          {{ dept.name }}
        </option>
      </select>
    </div>

    <!-- ラベル（管理者1件 or 一般ユーザー） -->
    <div class="ms-2 d-flex align-items-center">
      <span class="department-badge">
        {{ displayDepartmentName || '---' }}
      </span>
    </div>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" *ngIf="isAdmin">
          <a class="nav-link" routerLink="/reports" routerLinkActive="active" (click)="closeNavbar()"
            >報告書一覧</a
          >
        </li>

        <li class="nav-item" *ngIf="isAdmin">
          <a class="nav-link" routerLink="/employees" routerLinkActive="active" (click)="closeNavbar()"
            >従業員一覧</a
          >
        </li>
        <li class="nav-item" *ngIf="isAdmin">
          <a class="nav-link" routerLink="/departments" routerLinkActive="active" (click)="closeNavbar()"
            >所属設定</a
          >
        </li>

        <li class="nav-item" *ngIf="isAdmin">
          <a
            class="nav-link"
            routerLink="/report-due-dates"
            routerLinkActive="active" 
            (click)="closeNavbar()"
          >
            提出期日設定
          </a>
        </li>

        <li class="nav-item" *ngIf="isSystemAdmin">
          <a class="nav-link" routerLink="/security-locks" routerLinkActive="active" (click)="closeNavbar()">
            セキュリティ管理
          </a>
        </li>
        
        <li class="nav-item">
          <a class="nav-link" routerLink="/profile" routerLinkActive="active" (click)="closeNavbar()"
            >{{ userName }} さん</a
          >
        </li>

        <li class="nav-item">
          <a class="nav-link" (click)="onLogout()" style="cursor: pointer">
            ログアウト
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
