<div class="table-responsive">
  <table class="table app-table w-100">

    <thead>
      <tr>
        <th>種類</th>
        <th>提出期日</th>
        <th>提出日</th>
        <th>提出　→　受理　→　承認</th>
        <th></th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let data of dataList">

        <td>{{ data.name }}</td>

        <td>{{ data.dueDate | date:'MM/dd HH:mm' }}</td>

        <td>
          <ng-container *ngIf="data.submittedAt; else notSubmitted">
            {{ data.submittedAt | date:'MM/dd' }}
          </ng-container>
          <ng-template #notSubmitted>
            <span class="text-muted">未提出</span>
          </ng-template>
        </td>

        <!-- 状態 -->
        <td>
          <div class="status-timeline">

          <!-- 提出 -->
          <span
            class="node"
            [class.active]="data.status !== 'NOT_SUBMITTED'"
            matTooltip="{{ data.status !== 'NOT_SUBMITTED' ? '提出済み' : '未提出' }}">
          </span>

          <span
            class="bar"
            [class.active]="data.status !== 'NOT_SUBMITTED'">
          </span>

          <!-- 受理 -->
          <span
            class="node"
            [class.active]="data.status === 'RECEIVED' || data.status === 'APPROVED'"
            [class.reject]="data.status === 'NOT_SUBMITTED'"
            matTooltip="
              {{ data.status === 'RECEIVED' || data.status === 'APPROVED'
                  ? '受理'
                  : '未処理' }}">
          </span>

          <span
            class="bar"
            [class.active]="data.status === 'APPROVED'">
          </span>

          <!-- 承認 -->
          <span
            class="node"
            [class.active]="data.status === 'APPROVED'"
            matTooltip="
              {{ data.status === 'APPROVED'
                  ? '承認'
                  : '未処理' }}">
          </span>

        </div>

          
        </td>

        <!-- ボタン -->
        <td class="text-end">
          <app-button
            [label]="getButtonLabel(data)"
            [icon]="getButtonIcon(data)"
            (click)="onAction(data)">
          </app-button>
        </td>

      </tr>

    </tbody>

  </table>
</div>
