<div class="container pt-5 pb-5">
  <div class="page-card">

    <div class="d-flex flex-column flex-md-row mt-4 mb-4 pb-2 align-items-md-end gap-3">
      
      <div class="flex-grow-1 border-bottom pb-2">
        <h1 class="h1 mb-0 d-flex align-items-center">
          <app-icon name="files" class="me-2"></app-icon>
          業務報告書一覧
        </h1>
      </div>

      <div class="d-grid d-md-block">
        <app-button label="選択した報告書を出力 ({{selectedReports.size}})" icon="file-output" color="green" size="md"
          (click)="exportSelectedReports()" [disabled]="selectedReports.size === 0">
        </app-button>
      </div>
      
    </div> <div class="d-flex justify-content-end mb-3">
      <app-select label="表示月" [options]="reportMonthList" [(ngModel)]="selectedMonth"
        (ngModelChange)="updateTableData()" [optionLabelFn]="'formatDate'" valueFormat="month" class="month-select" />
    </div>

    <div class="table-responsive" [hidden]="loading">
      <table mat-table [dataSource]="dataSource" matSort class="app-table">
        <ng-container matColumnDef="select">
          <th mat-header-cell *matHeaderCellDef>
            <mat-checkbox (change)="toggleAllSelection($event.checked)" [checked]="isAllSelected()"
              [indeterminate]="isSomeSelected()"></mat-checkbox>
          </th>
          <td mat-cell *matCellDef="let report">

            <span
              [matTooltip]="
                report.receivedFlg !== true
                  ? '受理されていない報告書は出力できません'
                  : ''
              ">

              <mat-checkbox
                (change)="toggleSelection(report)"
                [checked]="isSelected(report)"
                [disabled]="report.receivedFlg !== true">
              </mat-checkbox>

            </span>

        </td>
        </ng-container>

        <ng-container matColumnDef="employeeName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>氏名</th>
          <td mat-cell *matCellDef="let report">{{ report.employeeName }}</td>
        </ng-container>

        <ng-container matColumnDef="reportMonth">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>日付</th>
          <td mat-cell *matCellDef="let report">
            {{ formatDate(report.reportMonth, "month") }}
          </td>
        </ng-container>

        <ng-container matColumnDef="dueDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>提出期日</th>
          <td mat-cell *matCellDef="let report">
            <ng-container *ngIf="report.dueDate">
              {{ formatDate(report.dueDate, "datetimeWithDay") }}
            </ng-container>
          </td>
        </ng-container>

        <ng-container matColumnDef="submittedAt">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>提出日時</th>
          <td mat-cell *matCellDef="let report">
            <ng-container *ngIf="report.completeFlg && report.submittedAt; else unsubmittedText">
              {{ formatDate(report.submittedAt, "datetimeWithDay") }}
            </ng-container>
            <ng-template #unsubmittedText>
              <span class="text-muted">未提出</span>
            </ng-template>
          </td>
        </ng-container>

        <ng-container matColumnDef="departmentName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>所属</th>
          <td mat-cell *matCellDef="let report">
            {{ report.departmentName }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="status-header">
            提出　→　受理　→　承認
          </th>

          <td mat-cell *matCellDef="let report" class="status-cell">

            <div class="status-timeline">

              <!-- 提出 -->
              <span class="node" [class.active]="report.completeFlg"
                matTooltip="{{ report.completeFlg ? '提出済み' : '未提出' }}">
              </span>

              <span class="bar" [class.active]="report.completeFlg">
              </span>

              <!-- 受理 -->
              <span class="node" [class.active]="report.receivedFlg === true"
                [class.reject]="report.receivedFlg === false" matTooltip="
                {{
                  report.receivedFlg === true
                    ? '受理'
                    : report.receivedFlg === false
                      ? '差戻し'
                      : '未処理'
                }}">
              </span>

              <span class="bar" [class.active]="report.receivedFlg === true">
              </span>

              <!-- 承認 -->
              <span class="node" [class.active]="report.approvalFlg === true"
                [class.reject]="report.approvalFlg === false" matTooltip="
                {{
                  report.approvalFlg === true
                    ? '承認'
                    : report.approvalFlg === false
                      ? '否認'
                      : '未処理'
                }}">
              </span>

            </div>

          </td>
        </ng-container>


        <ng-container matColumnDef="comment">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>コメント</th>
          <td mat-cell *matCellDef="let report">
            <app-icon *ngIf="report.comment" name="check"></app-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-center"></th>
          <td mat-cell *matCellDef="let report" class="text-center">
            <app-button label="報告書" icon="file-text" color="yellow" size="md" [routerLink]="['/reports', report.id]"
              [state]="{
                previousUrl: routerUrl,
                reportIds: reportIds
              }">
            </app-button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <ng-template #noReports>
      <p>データが存在しません。</p>
    </ng-template>
  </div>
</div>
