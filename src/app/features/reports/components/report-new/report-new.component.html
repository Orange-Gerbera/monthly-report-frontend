<div class="container py-5">
  <div class="page-card">
     <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>
    
    <app-report-form
      *ngIf="!isDisabled"
      [model]="report"
      mode="create"
      submitLabel="登録"
      backLabel="一覧に戻る"
      backIcon="rows-4"
      (formSubmit)="onCreate($event)"
      (cancel)="onBack()"
    >
    </app-report-form>
  </div>
</div>
