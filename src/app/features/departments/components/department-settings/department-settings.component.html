<div class="container pt-5 pt-3">
  <div class="page-card">

    <!-- タイトル -->
    <div class="row mb-4 mt-4 align-items-center">
      <div class="col-12">
        <h1 class="border-bottom pb-2 d-flex align-items-center">
          <app-icon name="building" class="title-icon me-2"></app-icon>
          所属設定
        </h1>

        <!-- 追加フォーム -->
        <div class="row mt-4">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              placeholder="新しい所属名"
              [(ngModel)]="newDepartmentName"
            />
            <button class="btn btn-primary" (click)="addDepartment()">
              追加
            </button>
          </div>

          <div *ngIf="errorMessage" class="text-danger small mt-2">
            {{ errorMessage }}
          </div>
        </div>
      </div>
    </div>

    <!-- 一覧 -->
    <div class="table-like">

      <div *ngFor="let dept of departments"
           class="row-item d-flex align-items-center justify-content-between"
           [class.inactive-row]="!dept.active">

        <!-- 左：状態＋名前 -->
        <div class="d-flex align-items-center gap-3 flex-grow-1">

          <!-- ★ ID追加 -->
          <span class="col-id">
            {{ dept.id }}
          </span>
          <!-- 状態ドット（クリックで切替） -->
          <span
            class="status-dot"
            [ngClass]="{
              'status-ok': dept.active,
              'status-off': !dept.active,
              'disabled-dot': isDisabled(dept)
            }"
            [matTooltip]="getDisableReason(dept) || (dept.active ? '無効にする' : '有効にする')"
            (click)="toggleByDot(dept)">
          </span>

          <!-- 所属名 -->
          <span class="col-name">
            {{ dept.name }}
          </span>

        </div>

        <!-- 右：削除 -->
        <span [matTooltip]="getDeleteTooltip(dept)">
          <app-button
            *ngIf="dept.name !== '(所属なし)'"
            label="削除"
            icon="trash-2"
            color="red"
            size="md"
            [disabled]="isDeleteDisabled(dept)"
            [class.disabled-btn]="isDeleteDisabled(dept)"
            (click)="deleteDepartment(dept.id)">
          </app-button>
        </span>

      </div>

    </div>

  </div>
</div>
