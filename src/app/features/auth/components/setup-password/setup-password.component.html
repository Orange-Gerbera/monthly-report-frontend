<div class="container mt-5" style="max-width: 500px;">
  <h2 class="mb-4">パスワード設定</h2>

  <div class="alert alert-warning mb-3">
    新しいパスワードを設定してください。
  </div>

  <!-- 読み込み -->
  <div *ngIf="loading" class="text-center my-4">
    読み込み中...
  </div>

  <div *ngIf="successMessage" class="alert alert-success mt-3">
    {{ successMessage }}
  </div>

  <div *ngIf="!loading && errorMessage" class="text-danger mb-3">
    {{ errorMessage }}
  </div>

  <form
      *ngIf="!loading && validToken && !successMessage"
      (ngSubmit)="submit()"
      novalidate
    >
    <div class="mb-3">
      <label for="password" class="form-label">新しいパスワード</label>

      <!-- 条件表示（仕様固定） -->
      <div class="form-text mb-2">
        9～64文字で、英大文字・英小文字・数字・記号を含めてください。
      </div>

      <!-- パスワード入力 + 表示切替 -->
      <div class="input-group">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          class="form-control"
          [(ngModel)]="password"
          maxlength="64"
          name="password"
          required
          inputmode="latin"
          autocomplete="new-password"
          (input)="sanitizePassword($event)"
          (ngModelChange)="checkPasswordStrength($event)"
        />
        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="togglePassword()"
          tabindex="-1"
        >
          <i
            class="bi"
            [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
          ></i>
        </button>
      </div>

      <!-- 強度表示 -->
      <div *ngIf="passwordStrength" class="mt-2">
        <small [ngClass]="passwordStrengthClass" class="fw-bold">
          {{ passwordStrength }}
        </small>
      </div>
    </div>

    <button
      class="btn btn-primary w-100"
      type="submit"
      [disabled]="passwordStrengthClass !== 'text-success' || submitting"
    >
        {{ submitting ? '設定中...' : '設定する' }}
    </button>
  </form>

 
</div>
