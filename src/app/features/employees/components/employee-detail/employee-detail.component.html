<div *ngIf="employee$ | async as employee">
  <div class="container mt-5 pt-4">
    <div class="page-card employee-detail-card">
      <!-- タイトル行（一覧と統一） -->
      <div class="d-flex mt-4 mb-4 pb-2 align-items-end">
        <div class="flex-grow-1 border-bottom me-3 pb-2">
          <h1 class="mb-0 d-flex align-items-center">
            <app-icon name="user-round" class="title-icon me-2"></app-icon>
            従業員 詳細
          </h1>
        </div>
        <div class="col-auto pb-2">
          <app-button 
          *ngIf="canEdit(employee)"
          label="プロフィール編集" 
          icon="user-round-pen" 
          color="blue" 
          [routerLink]="'/employees/' + employee.code + '/edit'">
          </app-button>
        </div>
      </div>
      <!-- 戻る + 削除 -->
      <div class="d-flex gap-2 mb-4">
        <app-button 
        label="一覧に戻る" 
        icon="rows-4" 
        color="gray" 
        [routerLink]="'/employees'">
        </app-button>
        <app-button 
        *ngIf="canEdit(employee) && employee.role !== 'SYSTEM_ADMIN'"
        label="削除" 
        icon="trash-2" 
        color="red" 
        (click)="onDelete(employee)">
        </app-button>
      </div>
      <!-- 基本情報 -->
      <div class="detail-card">
        <div class="detail-left">
          <div class="detail-item">
            <div class="detail-label">従業員番号</div>
            <div class="detail-value">{{ employee.code }}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">氏名</div>
            <div class="detail-value">
              {{ employee.lastName }} {{ employee.firstName }}
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-label">メールアドレス</div>
            <div class="detail-value">{{ employee.email }}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">所属</div>
            <div class="detail-value">{{ employee.departmentName }}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">権限</div>
            <div class="detail-value">{{ employee.role | roleLabel }}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">雇用状態</div>
            <div class="detail-value">
              {{ employee.employmentStatus | employmentStatusLabel }}
            </div>
          </div>
        </div>
        <div class="detail-right">
          <div class="detail-item">
            <div class="detail-label">パスワード</div>
            <div class="detail-value d-flex align-items-center gap-3">
              <span class="status-badge" [ngClass]="employee.enabled ? 'status-ok' : 'status-ng'">
                {{ employee.enabled ? '設定済み' : '未設定' }}
              </span>
              <app-button
                *ngIf="canEdit(employee) && employee.role !== 'SYSTEM_ADMIN'"
                label="トークン発行" 
                icon="mail-plus" 
                size="md" 
                color="blue" 
                (click)="issueToken(employee)">
              </app-button>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-label">システム利用可否</div>
            <div class="detail-value">
              <div class="form-check form-switch m-0">
                <input 
                  class="form-check-input" 
                  type="checkbox" 
                  [(ngModel)]="employee.active"
                  (change)="toggleActive(employee)"
                  [disabled]="!canEdit(employee) || employee.role === 'SYSTEM_ADMIN'"
                />
                <label class="form-check-label ms-2">
                  {{ employee.active ? '利用可能' : '利用停止' }}
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
