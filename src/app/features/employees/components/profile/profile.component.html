<div class="container py-5">
  <div class="page-card">

    <div class="mb-3">
      <app-button
        [label]="showForm ? '編集を閉じる' : 'プロフィール編集'"
        [icon]="showForm ? 'x' : 'user-round-pen'"
        color="gray"
        size="md"
        (click)="showForm = !showForm"
      ></app-button>
    </div>

    <div class="row pb-2 mt-3 flex-column flex-md-row align-items-md-end" *ngIf="!showForm">
      
      <div class="col pb-2">
        <h1 class="mb-0 border-bottom pb-2 d-flex align-items-center">
          <app-icon name="circle-user-round" class="title-icon me-3"></app-icon>
          {{ userName }} さん
        </h1>
      </div>

      <div class="col-auto pb-2 mt-3 mt-md-0">
        <div class="d-flex flex-column flex-md-row align-items-md-center gap-3">
          
          <div class="form-check mb-0 order-2 order-md-1" *ngIf="!isSystemAdmin">
            <input
              type="checkbox"
              class="form-check-input"
              id="useLatest"
              [(ngModel)]="useLatest"
              name="useLatest"
            />
            <label class="form-check-label" for="useLatest">
              直近を引き継ぐ
            </label>
          </div>

          <div class="order-1 order-md-2 d-grid d-md-block">
            <app-button
              class="w-100"
              label="報告書作成"
              icon="file-plus-corner"
              color="blue"
              size="md"
              [routerLink]="isSystemAdmin ? [] : ['/reports/new']"
              [state]="{ previousUrl: previousUrl }"
              [queryParams]="{ useLatest: useLatest }"
              [disabled]="isSystemAdmin"
              [matTooltip]="isSystemAdmin ? 'システム管理者は報告書の新規作成はできません' : '新規報告書を作成します'"
              matTooltipPosition="above"
            ></app-button>
          </div>

        </div>
      </div>
    </div>

    <app-employee-edit *ngIf="showForm" [selfMode]="true"></app-employee-edit>
    <app-report-table *ngIf="!showForm" [filterByUser]="true"></app-report-table>
  </div>
</div>
