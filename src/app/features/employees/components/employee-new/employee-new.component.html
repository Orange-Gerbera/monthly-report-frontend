<div class="container mt-5 pt-3">
  <div class="page-card">
    <!-- タイトル -->
    <div class="row mb-4 mt-3 align-items-center">
      <div class="col-12 col-md-12 offset-md-0">
       
        <h1 class="mb-4 border-bottom pb-2 d-flex align-items-center">
          <app-icon name="user-round-plus" class="title-icon me-3"></app-icon>
          従業員 新規作成
        </h1>

        <form
          #form="ngForm"
          (ngSubmit)="onSubmit(form)"
          class="needs-validation"
          novalidate
          autocomplete="off"
        >
          <!-- 従業員番号（数字のみ） -->
          <div class="row mb-4">
            <div class="col-12 col-md-6">
              <label for="code" class="form-label">従業員番号</label>

              <!-- ★追加：blur -->
              <input
                type="number"
                id="code"
                class="form-control"
                placeholder="例: 1234"
                [(ngModel)]="employee.code"
                name="code"
                required
                #codeInput="ngModel"
                (blur)="checkEmployeeExists()"
              />

              <div
                *ngIf="codeInput.invalid && codeInput.touched"
                class="form-text text-danger"
              >
                従業員番号を数字で入力してください。
              </div>

              <!-- 自部署 -->
              <div *ngIf="mode === 'same'" class="alert alert-danger mt-2">
                この従業員は既にこの部署に所属しています。<br>
                この画面では操作できません。
              </div>

              <!-- 他部署 -->
              <div *ngIf="mode === 'transfer'" class="alert alert-warning mt-2">
                この従業員 
                <strong>
                  {{ existingEmployee?.employeeName }}さん
                </strong>
                は、現在（{{ existingEmployee?.departmentName }}）
                に所属しています。

                <div class="mt-2">
                  <app-button
                    label="「 {{ targetDeptName }} 」へ異動"
                    icon="arrow-left-right"
                    color="yellow"
                    size="md"
                    (click)="transferEmployee()">
                  </app-button>
                </div>
              </div>

            </div>
          </div>

          <!-- 氏名 -->
          <div class="row g-3 mb-4">
            <div class="col-12 col-md-6">
              <label for="lastName" class="form-label">姓</label>

              <!-- ★readonly追加 -->
              <input
                type="text"
                id="lastName"
                class="form-control"
                placeholder="例: 山田"
                [(ngModel)]="employee.lastName"
                name="lastName"
                required
                #lastNameInput="ngModel"
                [readonly]="mode !== 'new'"
              />

              <div
                *ngIf="lastNameInput.invalid && lastNameInput.touched"
                class="form-text text-danger"
              >
                姓を入力してください。
              </div>
            </div>

            <div class="col-12 col-md-6">
              <label for="firstName" class="form-label">名</label>

              <!-- ★readonly追加 -->
              <input
                type="text"
                id="firstName"
                class="form-control"
                placeholder="例: 太郎"
                [(ngModel)]="employee.firstName"
                name="firstName"
                required
                #firstNameInput="ngModel"
                [readonly]="mode !== 'new'"
              />

              <div
                *ngIf="firstNameInput.invalid && firstNameInput.touched"
                class="form-text text-danger"
              >
                名を入力してください。
              </div>
            </div>
          </div>

          <!-- パスワード -->
          <div class="row mb-4">
            <div class="col-12 col-md-6">
              <label for="password" class="form-label">
                仮パスワード
                <small class="text-muted d-block">
                  9～64文字で英大小・数字・記号
                </small>
                <small class="text-success d-block">
                  ※空欄で招待メール送信
                </small>
              </label>

              <div class="input-group">
                <!-- ★readonly追加 -->
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  id="password"
                  class="form-control"
                  [(ngModel)]="employee.password"
                  name="new-password"
                  autocomplete="new-password"
                  minlength="9"
                  maxlength="64"
                  #passwordInput="ngModel"
                  (input)="sanitizePassword($event)"
                  (ngModelChange)="checkPasswordStrength($event)"
                  [readonly]="mode !== 'new'"
                />

                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  (click)="togglePassword()"
                  tabindex="-1"
                >
                  <i
                    class="bi"
                    [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
                  ></i>
                </button>
              </div>

              <!-- ★★★ ここだけ追加（他は一切変更なし）★★★ -->
              <div *ngIf="passwordStrength" class="mt-2">

                <div
                  class="progress"
                  style="height: 8px; max-width: 260px; width: 100%"
                >
                  <div
                    class="progress-bar"
                    role="progressbar"
                    [ngClass]="{
                      'bg-danger': passwordStrengthClass === 'text-danger',
                      'bg-warning': passwordStrengthClass === 'text-warning',
                      'bg-success': passwordStrengthClass === 'text-success'
                    }"
                    style="width: 100%"
                  ></div>
                </div>

                <div class="d-flex mt-1">
                  <i
                    class="bi"
                    [ngClass]="{
                      'bi-x-circle-fill text-danger':
                        passwordStrengthClass === 'text-danger',
                      'bi-exclamation-circle-fill text-warning':
                        passwordStrengthClass === 'text-warning',
                      'bi-check-circle-fill text-success':
                        passwordStrengthClass === 'text-success'
                    }"
                    style="margin-right: 6px"
                  ></i>

                  <small [ngClass]="passwordStrengthClass" class="fw-bold m-0">
                    {{ passwordStrength }}
                  </small>
                </div>

              </div>
              <!-- ★★★ ここまで ★★★ -->

            </div>
          </div>

          <!-- メール -->
          <div class="row mb-4">
            <div class="col-12 col-md-6">
              <label for="email" class="form-label">メールアドレス</label>

              <!-- ★readonly追加 -->
              <input
                type="email"
                id="email"
                class="form-control"
                [(ngModel)]="employee.email"
                name="new-email"
                autocomplete="off"
                required
                #emailInput="ngModel"
                (ngModelChange)="onEmailChange()"
                [readonly]="mode !== 'new'"
              />

              <div
                *ngIf="emailInput.invalid && emailInput.touched"
                class="form-text text-danger"
              >
                有効なメールアドレスを入力してください。
              </div>
            </div>
          </div>

          <!-- 権限 & 所属 -->
          <div class="row g-3 mb-4">
            <div class="col-12 col-md-6">
              <label class="form-label">権限</label>

              <!-- ★disabled追加 -->
              <select
                class="form-select"
                [(ngModel)]="employee.role"
                name="role"
                required
                #roleInput="ngModel"
                (ngModelChange)="onRoleChange()"
                [disabled]="mode !== 'new'"
              >
                <option *ngFor="let option of roleOptions" [value]="option.value">
                  {{ option.label }}
                </option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">所属</label>

              <!-- ★disabled追加 -->
              <select
                class="form-select"
                [(ngModel)]="employee.departmentId"
                name="departmentId" required
                #departmentInput="ngModel"
                [disabled]="mode !== 'new'"
              >
                <option [ngValue]="null" disabled>-- 所属を選択 --</option>
                <option
                  *ngFor="let dept of departments; trackBy: trackByDeptId"
                  [ngValue]="dept.id">
                  {{ dept.name }}
                </option>
              </select>
            </div>
          </div>

          <!-- 送信 -->
          <div class="text-end">
            <!-- ★重要：mode制御 -->
            <button
              type="submit"
              class="btn btn-primary px-4"
              [disabled]="form.invalid || isPasswordInvalid() || mode !== 'new'"
            >
              登録
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
